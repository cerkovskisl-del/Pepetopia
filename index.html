<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Vienkāršais SimCity</title>
    <style>
        body { font-family: sans-serif; background: #1b261b; color: white; text-align: center; margin: 0; padding: 10px; user-select: none; }
        .dashboard { background: #2c3e2c; padding: 10px; display: inline-flex; gap: 20px; border-radius: 5px; align-items: center; margin-bottom: 10px; border: 2px solid #4a6b4a; }
        .stat { font-weight: bold; font-size: 14px; text-align: left; }
        .stat span { color: #2ecc71; font-size: 16px; }
        .rci { display: flex; gap: 3px; background: black; padding: 3px; height: 30px; align-items: flex-end; }
        .rci-bar { width: 10px; height: 50%; }
        .controls { margin-bottom: 10px; }
        button { padding: 8px 12px; font-weight: bold; cursor: pointer; border-radius: 4px; border: none; background: #cbdcc0; margin: 2px; }
        button.active { background: #2ecc71; color: white; }
        canvas { background: #223322; border: 3px solid #4a6b4a; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <h1>🏙️ Mans Vienkāršais SimCity</h1>

    <div class="dashboard">
        <div class="stat">Nauda:<br><span id="m-disp">3000</span>$</div>
        <div class="stat">Ienākumi:<br><span id="i-disp">+0</span>$</div>
        <div class="stat">Iedzīvotāji:<br><span id="p-disp">0</span> 🧑‍🤝‍🧑</div>
        <div class="stat">Nodokļi: <span id="t-disp">7</span>%<br>
            <button onclick="changeTax(-1)" style="padding:1px 5px;">-</button>
            <button onclick="changeTax(1)" style="padding:1px 5px;">+</button>
        </div>
        <div class="rci">
            <div id="br" class="rci-bar" style="background:#2ecc71;"></div>
            <div id="bc" class="rci-bar" style="background:#3498db;"></div>
        </div>
    </div>

    <div class="controls">
        <button id="b-road" class="active" onclick="setTool('road')">🟫 Ceļš ($10)</button>
        <button id="b-zoneR" onclick="setTool('zoneR')">🟩 Dzīvojamā ($50)</button>
        <button id="b-zoneC" onclick="setTool('zoneC')">🟦 Komercija ($60)</button>
        <button id="b-power" onclick="setTool('power')">🏭 El. Stacija ($400)</button>
        <button id="b-clear" onclick="setTool('clear')" style="background:#e74c3c; color:white;">💣 Nojaukt</button>
    </div>

    <canvas id="gameCanvas" width="800" height="480"></canvas>

    <script src="game.js"></script>
</body>
</html>

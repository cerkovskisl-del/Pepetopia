<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro City Simulator</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #1a1c1e; 
            color: #e3e4e5; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
            user-select: none; 
        }
        h1 {
            color: #5cb85c;
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
        }
        .dashboard { 
            background: #2d3135; 
            padding: 12px 20px; 
            display: inline-flex; 
            gap: 25px; 
            border-radius: 6px; 
            align-items: center; 
            margin-bottom: 15px; 
            border: 2px solid #4f5b66;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .stat { font-weight: bold; font-size: 13px; text-align: left; text-transform: uppercase; }
        .stat span { color: #5cb85c; font-size: 18px; text-shadow: 1px 1px #000; }
        .rci-container { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .rci-label { font-size: 10px; font-weight: bold; }
        .rci { display: flex; gap: 4px; background: #111; padding: 4px; height: 35px; align-items: flex-end; border: 1px solid #4f5b66; }
        .rci-bar { width: 12px; height: 50%; transition: height 0.3s; }
        .controls { margin-bottom: 15px; }
        button { 
            padding: 10px 16px; 
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 4px; 
            border: 2px solid #4f5b66; 
            background: #343d46; 
            color: #fff;
            box-shadow: 0 4px #1a1c1e;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px #1a1c1e; }
        button.active { background: #5cb85c; color: white; border-color: #4cae4c; }
        canvas { 
            background: #2b3a2b; 
            border: 4px solid #4f5b66; 
            border-radius: 6px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.7); 
        }
    </style>
</head>
<body>

    <h1>🏙️ RETRO CITY SIMULATOR</h1>

    <div class="dashboard">
        <div class="stat">Treasury:<br><span id="m-disp">3000</span>$</div>
        <div class="stat">Cashflow:<br><span id="i-disp">+0</span>$</div>
        <div class="stat">Population:<br><span id="p-disp">0</span></div>
        <div class="stat">Taxes: <span id="t-disp">7</span>%<br>
            <button onclick="changeTax(-1)" style="padding:1px 6px; margin-top:3px; font-size:10px;">-</button>
            <button onclick="changeTax(1)" style="padding:1px 6px; margin-top:3px; font-size:10px;">+</button>
        </div>
        <div class="rci-container">
            <div class="rci-label">RCI DEMAND</div>
            <div class="rci">
                <div id="br" class="rci-bar" style="background:#5cb85c;" title="Residential"></div>
                <div id="bc" class="rci-bar" style="background:#4a90e2;" title="Commercial"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="b-road" class="active" onclick="setTool('road')">🟫 ROAD ($10)</button>
        <button id="b-zoneR" onclick="setTool('zoneR')">🟩 RESIDENTIAL ($50)</button>
        <button id="b-zoneC" onclick="setTool('zoneC')">🟦 COMMERCIAL ($60)</button>
        <button id="b-power" onclick="setTool('power')">🏭 POWER PLANT ($400)</button>
        <button id="b-clear" onclick="setTool('clear')" style="background:#d9534f; color:white; border-color:#d43f3a;">💣 DEMOLISH</button>
    </div>

    <canvas id="gameCanvas" width="800" height="480"></canvas>

    <script src="game.js"></script>
</body>
</html>
